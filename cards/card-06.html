<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>漂浮洞 · 读者来信</title>
  <link rel="stylesheet" href="css/cards.css">
  <style>
    .card {
      background: #f2efe8;
      color: #2a2218;
      display: flex;
      flex-direction: column;
      justify-content: center;
      align-items: center;
      text-align: center;
      padding: 64px 56px;
    }
    .card__icon {
      width: 80px; height: 80px;
      border-radius: 50%;
      border: 2px solid rgba(42,34,24,.1);
      display: flex; align-items: center; justify-content: center;
      font-size: 32px;
      margin-bottom: 28px;
    }
    .card__kicker { color: #8b7a60; margin-bottom: 16px; letter-spacing: .15em; }
    .card__title { font-size: 48px; margin-bottom: 16px; }
    .card__body { color: #5c4e38; font-size: 17px; max-width: 340px; margin-bottom: 28px; }
    .card__deco-line { background: #c75b39; margin: 0 auto 24px; }
    .card__quote {
      font-family: var(--font-serif);
      font-size: 20px;
      font-style: italic;
      color: #8b7a60;
      max-width: 360px;
      line-height: 1.6;
    }
    .card__author { font-size: 14px; color: #a89880; margin-top: 8px; }
    .card__number { top: 48px; left: 52px; color: #2a2218; opacity: .05; font-size: 72px; }
    .card__corner { position: absolute; bottom: 48px; right: 52px; width: 40px; height: 40px; border-right: 2px solid rgba(42,34,24,.1); border-bottom: 2px solid rgba(42,34,24,.1); }
  </style>
</head>
<body>
  <div class="card">
    <span class="card__number">06</span>
    <div class="card__corner"></div>
    <div class="card__icon">✉</div>
    <p class="card__kicker">读者来信 · Letters</p>
    <h1 class="card__title">读者来信</h1>
    <div class="card__deco-line"></div>
    <p class="card__body">来自读者的回响——读后感、城市观察投稿、<br>对上一期主题的补充视角。</p>
    <p class="card__quote">"杂志是双向的对话，<br>而非单向的广播。"</p>
    <p class="card__author">— 漂浮洞编辑部</p>
  </div>
</body>
</html>
