<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>漂浮洞 · 城市漫游</title>
  <link rel="stylesheet" href="css/cards.css">
  <style>
    .card {
      background: linear-gradient(175deg, #f5f0e8 0%, #ede4d4 40%, #e3d5bd 100%);
      color: #3a2a1a;
      display: flex;
      flex-direction: column;
      justify-content: flex-end;
      padding: 56px 52px;
    }
    .card__top-deco {
      position: absolute;
      top: 48px;
      right: 48px;
      width: 120px;
      height: 120px;
      border: 2px solid rgba(58,42,26,.12);
      border-radius: 50%;
    }
    .card__number { bottom: 52px; right: 52px; color: #3a2a1a; opacity: .08; }
    .card__kicker { color: #8b6f4e; margin-bottom: 16px; }
    .card__title { font-size: 64px; margin-bottom: 24px; letter-spacing: .04em; }
    .card__body { color: #5c4330; max-width: 380px; margin-bottom: 40px; }
    .card__deco-line { background: #c75b39; margin-bottom: 24px; }
    .card__footer { display: flex; gap: 12px; }
    .card__tag { background: rgba(199,91,57,.12); color: #8b4a2e; }
  </style>
</head>
<body>
  <div class="card">
    <div class="card__top-deco"></div>
    <span class="card__number">01</span>
    <p class="card__kicker">城市漫游 · City Walk</p>
    <h1 class="card__title">街头<br>的呼吸</h1>
    <div class="card__deco-line"></div>
    <p class="card__body">用脚步丈量一座城市，记录那些即将消失的<br>街区、店铺与人的故事。每期一座城，一个视角。</p>
    <div class="card__footer">
      <span class="card__tag">城市观察</span>
      <span class="card__tag">ISSUE 07</span>
    </div>
  </div>
</body>
</html>
