<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>漂浮洞 · 视觉笔记</title>
  <link rel="stylesheet" href="css/cards.css">
  <style>
    .card {
      background: #2a2a32;
      color: #e8e4dd;
      display: flex;
      flex-direction: column;
      padding: 0;
      position: relative;
    }
    .card__image-zone {
      flex: 1;
      background: linear-gradient(150deg, #3a3a46 0%, #2e2e3a 40%, #22222c 100%);
      margin: 24px 24px 0;
      border-radius: 8px;
      display: flex;
      align-items: center;
      justify-content: center;
      color: rgba(255,255,255,.08);
      font-size: 80px;
    }
    .card__bottom {
      padding: 36px 48px 48px;
      display: grid;
      grid-template-columns: 1fr auto;
      align-items: end;
      gap: 24px;
    }
    .card__title { font-size: 40px; line-height: 1.2; }
    .card__body { color: #a09888; font-size: 15px; line-height: 1.7; margin-top: 8px; }
    .card__side-number {
      font-family: var(--font-serif);
      font-size: 96px;
      font-weight: 900;
      color: rgba(255,255,255,.04);
      line-height: .8;
    }
    .card__kicker { color: #8a8070; margin-bottom: 8px; }
    .card__deco-line { background: #c9a96e; }
  </style>
</head>
<body>
  <div class="card">
    <div class="card__image-zone">▣</div>
    <div class="card__bottom">
      <div>
        <p class="card__kicker">视觉笔记 · Visual Essay</p>
        <div class="card__deco-line" style="margin-bottom:12px;"></div>
        <h1 class="card__title">视觉笔记</h1>
        <p class="card__body">每期一位摄影师或插画师，<br>用图像讲述一个完整的视觉故事。</p>
      </div>
      <div class="card__side-number">05</div>
    </div>
  </div>
</body>
</html>
